image: netbsd/latest
sources:
- https://git.sr.ht/~mcf/cproc
- git://c9x.me/qbe.git#v1.3
tasks:
- setup: |
    sudo patch -p1 -d /usr/include < cproc/.builds/netbsd.diff
- build-qbe: |
    cd qbe
    make
    sudo make install
- build: |
    cd cproc
    ./configure
    make all check bootstrap check-stage2
triggers:
- action: email
  condition: failure
  to: "<~mcf/cproc-builds@lists.sr.ht>"
