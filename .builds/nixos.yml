image: nixos/latest
sources:
- https://git.sr.ht/~mcf/cproc
- git://c9x.me/qbe.git#v1.3
repositories:
  nixpkgs: https://nixos.org/channels/nixpkgs-unstable
packages:
- nixpkgs.gcc
- nixpkgs.gnumake
tasks:
- build-qbe: make -C qbe
- build: |
    cd cproc
    ./configure --with-ldso= --with-qbe=$HOME/qbe/qbe
    make all check bootstrap check-stage2
triggers:
- action: email
  condition: failure
  to: "<~mcf/cproc-builds@lists.sr.ht>"
